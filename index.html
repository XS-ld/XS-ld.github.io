<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羊了个羊 - 简约版</title>
    <!-- 关键：添加版本号强制更新 -->
    <link rel="stylesheet" href="style.css?v=20240116">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐑</text></svg>">
    <style>
        /* 临时样式确保基础显示 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: #0f172a; 
            color: white; 
            padding: 20px; 
        }
        .debug-info {
            background: #ef4444; 
            color: white; 
            padding: 10px; 
            border-radius: 5px; 
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <!-- 调试信息 -->
    <div class="debug-info" id="debugInfo">
        CSS加载状态：<span id="cssStatus">检测中...</span>
    </div>
    
    <!-- 主题切换按钮 -->
    <div class="theme-toggle">
        <button id="themeBtn" aria-label="切换主题">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <!-- 语言切换 -->
    <div class="language-switcher">
        <select id="languageSelect">
            <option value="zh-CN">中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
        </select>
    </div>

    <!-- 游戏主容器 -->
    <div class="game-container">
        <header class="game-header">
            <h1><i class="fas fa-gamepad"></i> <span data-i18n="gameTitle">羊了个羊</span></h1>
            <div class="game-stats">
                <div class="stat">
                    <span class="stat-label" data-i18n="level">关卡</span>
                    <span class="stat-value" id="currentLevel">1</span>
                </div>
                <div class="stat">
                    <span class="stat-label" data-i18n="score">分数</span>
                    <span class="stat-value" id="score">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label" data-i18n="time">时间</span>
                    <span class="stat-value" id="timer">00:00</span>
                </div>
            </div>
        </header>

        <!-- 游戏控制栏 -->
        <div class="game-controls">
            <button id="newGameBtn" class="btn btn-primary">
                <i class="fas fa-play"></i> <span data-i18n="newGame">新游戏</span>
            </button>
            <button id="restartBtn" class="btn btn-secondary">
                <i class="fas fa-redo"></i> <span data-i18n="restart">重新开始</span>
            </button>
            <button id="hintBtn" class="btn btn-hint">
                <i class="fas fa-lightbulb"></i> <span data-i18n="hint">提示</span>
            </button>
            <button id="undoBtn" class="btn btn-undo">
                <i class="fas fa-undo"></i> <span data-i18n="undo">撤销</span>
            </button>
        </div>

        <!-- 游戏主区域 -->
        <div class="game-main">
            <!-- 顶部堆叠区 -->
            <div class="stack-area" id="stackArea">
                <div class="stack-header">
                    <h3 data-i18n="stackZone">堆叠区</h3>
                    <span class="stack-count">(<span id="stackCount">0</span>/7)</span>
                </div>
                <div class="stack-slots" id="stackSlots">
                    <!-- 堆叠槽位通过JS生成 -->
                </div>
            </div>

            <!-- 主游戏棋盘 -->
            <div class="game-board" id="gameBoard">
                <div class="card" style="background:#3b82f6;">🐑</div>
                <div class="card" style="background:#10b981;">🌿</div>
                <div class="card" style="background:#8b5cf6;">🌸</div>
                <div class="card" style="background:#f59e0b;">🥕</div>
                <div class="card" style="background:#ef4444;">💧</div>
                <div class="card" style="background:#ec4899;">☀️</div>
                <div class="card" style="background:#6366f1;">🌙</div>
                <div class="card" style="background:#14b8a6;">⭐</div>
            </div>

            <!-- 底部卡槽 -->
            <div class="slot-area" id="slotArea">
                <div class="slot-header">
                    <h3 data-i18n="eliminateZone">消除区</h3>
                    <span class="slot-count">(<span id="slotCount">0</span>/3)</span>
                </div>
                <div class="card-slots" id="cardSlots">
                    <div class="slot"></div>
                    <div class="slot"></div>
                    <div class="slot"></div>
                </div>
            </div>
        </div>

        <!-- 游戏状态提示 -->
        <div class="game-status">
            <p id="statusMessage" data-i18n="welcomeMessage">点击卡片开始游戏！</p>
        </div>

        <!-- 游戏规则说明 -->
